<!DOCTYPE html>
<html lang="en-gb"> 
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking - Rockvilla</title>
    <link rel="stylesheet" href="style.css">
    <script>
        // JavaScript to handle room booking
        let totalRooms = 10; // Set the total number of rooms
        let bookedRooms = 0; // Initialize booked rooms to 0

        function bookRoom() {
            if (bookedRooms < totalRooms) {
                // Check if the form is filled out
                if (validateForm()) {
                    bookedRooms++;
                    updateRoomCount();
                    alert("Room booked successfully!");
                    document.getElementById("bookingForm").reset();
                }
            } else {
                alert("Sorry, all rooms are booked!");
            }
        }

        function updateRoomCount() {
            document.getElementById('availableRooms').textContent = totalRooms - bookedRooms;
            document.getElementById('bookedRooms').textContent = bookedRooms;
        }

        function validateForm() {
            let name = document.getElementById("name").value;
            let email = document.getElementById("email").value;
            let checkIn = document.getElementById("checkIn").value;
            let checkOut = document.getElementById("checkOut").value;

            if (name == "" || email == "" || checkIn == "" || checkOut == "") {
                alert("Please fill out all fields in the form.");
                return false;
            }
            return true;
        }
    </script>
</head>
<body onload="updateRoomCount()">  
    <header>
        <h1>Book Your Student Accommodation</h1>
        <a href="mbody.html#dmainbody">Back to Home</a>
    </header>
    <main>
        <section id="roomAvailability">
            <h2>Room Availability</h2>
            <p>Total Rooms: <span id="totalRooms"></span></p>
            <p>Available Rooms: <span id="availableRooms"></span></p>
            <p>Booked Rooms: <span id="bookedRooms"></span></p>
        </section>
        <section id="bookingSection">
            <h2>Book a Room</h2>
            <form id="bookingForm">
                <label for="name">Full Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="checkIn">Check-in Date:</label>
                <input type="date" id="checkIn" name="checkIn" required>

                <label for="checkOut">Check-out Date:</label>
                <input type="date" id="checkOut" name="checkOut" required>

                <button type="button" onclick="bookRoom()">Book Now</button>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2023 Rockvilla. All rights reserved.</p>
    </footer>
    <script>
        // Set the total number of rooms in the HTML
        document.getElementById('totalRooms').textContent = totalRooms;
    </script>
</body>
</html>
